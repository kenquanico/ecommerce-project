<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dawnbound - Forms</title>
  <link rel="stylesheet" href="eses.css" />
</head>
<body>         

  <div class="container">

    <form id="registerForm" class="auth-form" action="register_handler.html" method="POST">
      <h2>Create Account for Dawnbound</h2>

      <div class="input-group">
        <input type="text" id="fullname" name="fullname" required />
        <label for="fullname">Full Name</label>
      </div>

      <div class="input-group">
        <input type="number" id="age" name="age" min="1" required />
        <label for="age">Age</label>
      </div>

      <div class="input-group">
        <input id="email" name="email" />
        <label for="email">Email</label>
      </div>

      <div class="input-group">
        <input type="password" id="password" name="password" required />
        <label for="password">Password</label>
      </div>

      <div class="preferences-group">
        <label for="preferences-select" class="preferences-label">Preferences:</label>
        <select id="preferences-select" name="preferences" required>
          <option value="" disabled selected>Select preference</option>
          <option value="Gamer">Gamer</option>
          <option value="Buyer">Buyer</option>
          <option value="Seller">Seller</option>
        </select>
      </div>

      <div class="terms-container">
        <label class="checkbox-container">
          I agree to the <a href="#" target="_blank">Terms and Conditions</a>
          <input type="checkbox" id="terms" name="terms" >
          <span class="checkmark"></span>
        </label>
      </div>

      <button type="submit">Register</button>

      <p class="login-link">
        Already have an account? <a href="#" class="login-link-anchor" id="showLogin">Log in</a>
      </p>
    </form>

  
    <form id="loginForm" class="auth-form hidden" action="homepage.html" method="GET">
      <h2>Login to Dawnbound</h2>

      <div class="input-group">
        <input type="email" id="login-email" name="email" required />
        <label for="login-email">Email</label>
      </div>

      <div class="input-group">
        <input type="password" id="login-password" name="password" required />
        <label for="login-password">Password</label>
      </div>

      <button type="submit">Login</button>

      <p class="login-link">
        Don't have an account? <a href="#" class="login-link-anchor" id="showRegister">Register</a>
      </p>
    </form>

  </div>

  <script src="index.js"></script>
</body>
</html>
