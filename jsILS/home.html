<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Shop | To-Do</title>
  <link href="../bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../register.css">
</head>
<body>

<div class="page-wrapper d-flex flex-column min-vh-100">

  <div class="d-flex justify-content-start p-3">
    <img src="../au.svg" alt="Logo" class="logo">
  </div>

  <div class="d-flex flex-column align-items-center flex-grow-1 pt-4">

    <div class="form-box main-form" style="width: 480px;">
      <h4 class="mb-4 text-center">Your To-Do List</h4>

      <div class="mb-3">
        <input type="text" id="taskName" class="form-control mb-2" placeholder="Task Name">
        <input type="time" id="taskTime" class="form-control mb-2">
        <button id="addTask" class="btn btn-threads w-100 mb-3">Add Task</button>
      </div>

      <ul id="taskList" class="list-group"></ul>

      <button id="logout" class="btn btn-danger w-100 mt-3">Logout</button>
    </div>

  </div>

  <footer class="footer py-3">
    <div class="container text-center d-flex flex-wrap justify-content-center align-items-center gap-3">
      <span>©2025 Aurora</span>
      <a href="#">Terms</a>
      <a href="#">Privacy Policy</a>
      <a href="#">Cookies Policy</a>
      <a href="#">Report a Problem</a>
    </div>
  </footer>

</div>

<div class="qr-wrapper">
  <p class="qr-label">Scan the App</p>
  <div id="qr-placeholder">
    <img src="../rora_qrcode.png" alt="Aurora QR code">
  </div>
</div>

<script src="../jquery.js"></script>
<script src="home.js"></script>
</body>
</html>
