<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Shop | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-wrapper d-flex flex-column min-vh-100">

  <div class="d-flex justify-content-start p-3">
    <img src="au.svg" alt="Logo" class="logo">
  </div>

  <div class="d-flex flex-column align-items-center justify-content-start flex-grow-1 pt-5">

    <div class="form-box main-form" style="width: 380px;">
      <h4 class="mb-4 text-center">Welcome Back</h4>
      <form id="loginForm" novalidate>
        <div class="mb-3">
          <input type="email" id="loginEmail" class="form-control input-modern" placeholder="Email">
        </div>
        <div class="mb-3">
          <input type="password" id="loginPassword" class="form-control input-modern" placeholder="Password">
        </div>
        <button type="submit" class="btn btn-threads w-100 mb-3">Log In</button>
      </form>
    </div>

    <div class="form-box mt-3" style="width: 380px; text-align: center;">
      <p class="label1 mb-0">Don't have an account? 
        <a href="registration.html" class="text-dark-gray">Register</a>
      </p>
    </div>

  </div>

  <footer class="footer py-3">
    <div class="container text-center d-flex flex-wrap justify-content-center align-items-center gap-3">
      <span>©2025 Aurora</span>
      <a href="#">Terms</a>
      <a href="#">Privacy Policy</a>
      <a href="#">Cookies Policy</a>
      <a href="#">Report a Problem</a>
    </div>
  </footer>

</div>

<div class="qr-wrapper">
  <p class="qr-label">Scan the App</p>
  <div id="qr-placeholder">
    <img src="rora_qrcode.png">
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/login.js"></script>
</body>
</html>
